<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mycoursor</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <header class="titlebar">
            <div class="titlebar-left">
                <span class="logo">&#9670; mycoursor</span>
            </div>
            <div class="titlebar-center">
                <span class="open-file-name" id="openFileName">No file open</span>
            </div>
            <div class="titlebar-right">
                <button class="btn btn-sm" id="indexBtn" title="Re-index project">Index</button>
                <span class="status-dot" id="statusDot"></span>
            </div>
        </header>

        <div class="main-layout">
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <span class="sidebar-title">Explorer</span>
                </div>
                <div class="file-tree" id="fileTree">
                    <div class="tree-loading">Loading...</div>
                </div>
            </aside>

            <div class="editor-area" id="editorArea">
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-content">
                        <h1>&#9670; mycoursor</h1>
                        <p>AI-powered code assistant</p>
                        <div class="welcome-actions">
                            <button class="btn btn-primary" id="welcomeIndexBtn">Index Project</button>
                            <button class="btn btn-outline" id="welcomeSearchBtn">Search Code</button>
                        </div>
                        <div class="status-info" id="statusInfo"></div>
                    </div>
                </div>
                <div class="code-viewer" id="codeViewer" style="display:none">
                    <div class="code-header">
                        <span class="code-filepath" id="codeFilePath"></span>
                        <span class="code-lang" id="codeLang"></span>
                    </div>
                    <div class="code-content">
                        <pre><code id="codeBlock"></code></pre>
                    </div>
                </div>
                <div class="search-results" id="searchResults" style="display:none">
                    <div class="results-header">
                        <span>Search Results</span>
                        <button class="btn btn-sm btn-close" id="closeSearch">&times;</button>
                    </div>
                    <div class="results-list" id="resultsList"></div>
                </div>
            </div>

            <aside class="panel" id="chatPanel">
                <div class="panel-tabs">
                    <button class="panel-tab active" data-tab="chat">AI Chat</button>
                    <button class="panel-tab" data-tab="search">Search</button>
                </div>

                <div class="panel-content" id="chatTab">
                    <div class="chat-messages" id="chatMessages">
                        <div class="chat-welcome">
                            <p>Ask me anything about your codebase.</p>
                        </div>
                    </div>
                    <div class="chat-input-area">
                        <textarea id="chatInput" placeholder="Ask about your code..." rows="2"></textarea>
                        <button class="btn btn-primary btn-send" id="chatSendBtn">Send</button>
                    </div>
                </div>

                <div class="panel-content" id="searchTab" style="display:none">
                    <div class="search-input-area">
                        <input type="text" id="searchInput" placeholder="Semantic search..." />
                        <button class="btn btn-primary btn-send" id="searchBtn">Go</button>
                    </div>
                    <div class="search-panel-results" id="searchPanelResults"></div>
                </div>
            </aside>
        </div>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <script src="/static/app.js"></script>
</body>
</html>
